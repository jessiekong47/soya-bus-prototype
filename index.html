<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

<script>
  const map = L.map("map").setView([45.4, 141.9], 9);

  L.tileLayer(
    "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
    { attribution: "&copy; OpenStreetMap contributors" }
  ).addTo(map);

  async function loadGTFS() {
    try {
      const response = await fetch("./soya_bus_gtfs_prototype.zip");
      const arrayBuffer = await response.arrayBuffer();
      const zip = await JSZip.loadAsync(arrayBuffer);

      // Read GTFS files
      const stopsText = await zip.file("stops.txt").async("text");
      const stopTimesText = await zip.file("stop_times.txt").async("text");
      const tripsText = await zip.file("trips.txt").async("text");

      const stops = Papa.parse(stopsText, {
        header: true,
        skipEmptyLines: true
      }).data;

      const stopTimes = Papa.parse(stopTimesText, {
        header: true,
        skipEmptyLines: true
      }).data;

      const trips = Papa.parse(tripsText, {
        header: true,
        skipEmptyLines: true
      }).data;

      // trip_id -> trip information
      const tripLookup = {};
      trips.forEach(trip => {
        tripLookup[trip.trip_id] = trip;
      });

      // stop_id -> departures
      const departuresByStop = {};

      stopTimes.forEach(st => {
        if (!departuresByStop[st.stop_id]) {
          departuresByStop[st.stop_id] = [];
        }

        const trip = tripLookup[st.trip_id];

        departuresByStop[st.stop_id].push({
          time: st.departure_time,
          headsign: trip ? trip.trip_headsign : ""
        });
      });

      const bounds = [];

      stops.forEach(stop => {
        const lat = parseFloat(stop.stop_lat);
        const lon = parseFloat(stop.stop_lon);

        if (isNaN(lat) || isNaN(lon)) return;

        const departures = departuresByStop[stop.stop_id] || [];

        // Sort by time
        departures.sort((a, b) =>
          a.time.localeCompare(b.time)
        );

        let departureHTML = "";

        if (departures.length > 0) {
          departureHTML = `
            <hr>
            <b>Scheduled departures</b><br>
            ${departures.map(d =>
              `${d.time.substring(0,5)} → ${d.headsign}`
            ).join("<br>")}
          `;
        } else {
          departureHTML = `
            <hr>
            No scheduled departures
          `;
        }

        L.marker([lat, lon])
          .addTo(map)
          .bindPopup(`
            <b>${stop.stop_name}</b><br>
            Stop ID: ${stop.stop_id}
            ${departureHTML}
          `);

        bounds.push([lat, lon]);
      });

      if (bounds.length > 0) {
        map.fitBounds(bounds, {
          padding: [30, 30]
        });
      }

      document.getElementById("status").textContent =
        "Loaded " + bounds.length +
        " GTFS stops with departure times";

    } catch (error) {
      console.error(error);

      document.getElementById("status").textContent =
        "Error: " + error.message;
    }
  }

  loadGTFS();
</script>
