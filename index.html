<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soya Bus GTFS Prototype</title>

  <link rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <style>
    html, body { height: 100%; margin: 0; font-family: Arial, sans-serif; }
    #header { padding: 10px 14px; }
    #header h2 { margin: 0 0 6px 0; }
    #status { font-size: 14px; }
    #map { height: calc(100vh - 82px); width: 100%; }
    .departures { max-height: 220px; overflow-y: auto; min-width: 230px; }
  </style>
</head>

<body>
  <div id="header">
    <h2>Soya Bus GTFS Prototype</h2>
    <div id="status">Loading GTFS feed...</div>
  </div>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <script>
    const statusEl = document.getElementById("status");
    const map = L.map("map").setView([45.4, 141.9], 9);

    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "&copy; OpenStreetMap contributors",
      maxZoom: 19
    }).addTo(map);

    function esc(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function readZipText(zip, filename) {
      const file = zip.file(filename);
      if (!file) throw new Error(filename + " not found inside GTFS ZIP");
      return await file.async("text");
    }

    async function loadGTFS() {
      try {
        // Cache-busting query helps GitHub Pages serve the newest ZIP.
        const response = await fetch("./soya_bus_gtfs_prototype.zip?v=3");
        if (!response.ok) {
          throw new Error("GTFS ZIP fetch failed: HTTP " + response.status);
        }

        const zip = await JSZip.loadAsync(await response.arrayBuffer());

        const [stopsText, stopTimesText, tripsText] = await Promise.all([
          readZipText(zip, "stops.txt"),
          readZipText(zip, "stop_times.txt"),
          readZipText(zip, "trips.txt")
        ]);

        const parseOpts = { header: true, skipEmptyLines: true };
        const stops = Papa.parse(stopsText, parseOpts).data;
        const stopTimes = Papa.parse(stopTimesText, parseOpts).data;
        const trips = Papa.parse(tripsText, parseOpts).data;

        const tripLookup = {};
        for (const trip of trips) {
          tripLookup[trip.trip_id] = trip;
        }

        const departuresByStop = {};
        for (const st of stopTimes) {
          if (!departuresByStop[st.stop_id]) departuresByStop[st.stop_id] = [];
          const trip = tripLookup[st.trip_id] || {};
          departuresByStop[st.stop_id].push({
            time: st.departure_time || st.arrival_time || "",
            headsign: trip.trip_headsign || "",
            tripId: st.trip_id || ""
          });
        }

        const bounds = [];
        let markerCount = 0;

        for (const stop of stops) {
          const lat = Number(stop.stop_lat);
          const lon = Number(stop.stop_lon);
          if (!Number.isFinite(lat) || !Number.isFinite(lon)) continue;

          const departures = (departuresByStop[stop.stop_id] || [])
            .sort((a, b) => a.time.localeCompare(b.time));

          let depHtml = "<div class='departures'><b>Scheduled departures</b><br>";
          if (departures.length === 0) {
            depHtml += "No scheduled departures";
          } else {
            depHtml += departures.map(d => {
              const shortTime = d.time ? d.time.slice(0, 5) : "--:--";
              return esc(shortTime) + " → " + esc(d.headsign || d.tripId);
            }).join("<br>");
          }
          depHtml += "</div>";

          const popupHtml =
            "<b>" + esc(stop.stop_name) + "</b><br>" +
            "Stop ID: " + esc(stop.stop_id) + "<hr>" +
            depHtml;

          L.marker([lat, lon]).addTo(map).bindPopup(popupHtml, {
            maxHeight: 300,
            maxWidth: 320
          });

          bounds.push([lat, lon]);
          markerCount++;
        }

        if (bounds.length) map.fitBounds(bounds, { padding: [25, 25] });

        statusEl.textContent =
          "Loaded " + markerCount + " GTFS stops — click a marker for departure times";

      } catch (err) {
        console.error(err);
        statusEl.textContent = "Error: " + err.message;
      }
    }

    loadGTFS();
  </script>
</body>
</html>
